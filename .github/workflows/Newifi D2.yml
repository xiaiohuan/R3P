name: Build Newifi D2

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    env:
      # 临时解决 Node.js 弃用警告
      ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true
      # 时区
      TZ: Asia/Shanghai
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libncurses5-dev libssl-dev \
            git-core wget curl unzip bzip2 flex bison patch perl \
            python3 python3-distutils libxml-parser-perl

      - name: Clone LEDE source
        run: |
          git clone https://github.com/coolsnowwolf/lede.git lede
          cd lede
          cp ../diy-part1.sh .
          cp ../diy-part2.sh .
          cp ../.config .
          ./diy-part1.sh

      - name: Pre-config
        run: |
          cd lede
          ./scripts/feeds install -a
          ./diy-part2.sh

      - name: Build firmware
        run: |
          cd lede
          make -j$(nproc) V=s

